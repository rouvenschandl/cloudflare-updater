name: release

on:
  workflow_dispatch:

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  release:
    runs-on: ubuntu-latest
    outputs:
      release_ref: ${{ steps.release_ref.outputs.ref }}
      release_version: ${{ steps.release_ref.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Check
        run: bun run check:fix

      - name: Test
        run: bun test

      - name: Build
        run: bun run build

      - name: Semantic Release
        id: semantic
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bunx semantic-release

      - name: Resolve release ref and version
        id: release_ref
        run: |
          TAG="$(git describe --tags --abbrev=0 2>/dev/null || true)"

          if [ -n "$TAG" ]; then
            VERSION="${TAG#v}"
            REF="$TAG"
          else
            VERSION="$(node -p "require('./package.json').version")"
            REF="$GITHUB_SHA"
          fi

          echo "ref=$REF" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

  docker:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.release.outputs.release_ref }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=v${{ needs.release.outputs.release_version }}
            type=raw,value=${{ needs.release.outputs.release_version }}
            type=semver,pattern={{version}},value=v${{ needs.release.outputs.release_version }}
            type=semver,pattern={{major}}.{{minor}},value=v${{ needs.release.outputs.release_version }}
            type=semver,pattern={{major}},value=v${{ needs.release.outputs.release_version }}
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
